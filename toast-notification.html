<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Toast Notification</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .font-mono-custom { font-family: 'Space Mono', monospace; }

    .toast { animation: slideUp 0.38s cubic-bezier(0.34,1.56,0.64,1) both; }
    .toast.dismissing { animation: slideDown 0.28s cubic-bezier(0.4,0,1,1) forwards; }

    .toast-glow::before {
      content: '';
      position: absolute;
      top: 0; left: 16px; right: 16px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #b0e892, transparent);
      opacity: 0.5;
    }
    .toast-glow.warning::before { background: linear-gradient(90deg, transparent, #f6c90e, transparent); }
    .toast-glow.error::before   { background: linear-gradient(90deg, transparent, #ff6b6b, transparent); }

    .toast-progress {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      border-radius: 0 0 14px 14px;
      animation: shrink linear forwards;
    }

    @keyframes slideUp {
      from { opacity:0; transform: translateY(20px) scale(0.95); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }
    @keyframes slideDown {
      from { opacity:1; transform: translateY(0) scale(1); }
      to   { opacity:0; transform: translateY(14px) scale(0.95); }
    }
    @keyframes shrink {
      from { width: 100%; }
      to   { width: 0%; }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center gap-4" style="background:#0a1a1a;">

  <p class="font-mono-custom text-xs tracking-widest mb-2" style="color:rgba(176,232,146,0.3);">▼ CLICK TO TRIGGER TOASTS ▼</p>

  <div class="flex flex-wrap gap-3 justify-center">
    <button onclick="showToast('success')" class="font-mono-custom text-xs px-5 py-2.5 rounded-xl border transition-all duration-200" style="background:#003333;border-color:#027c68;color:#b0e892;" onmouseover="this.style.background='#027c68'" onmouseout="this.style.background='#003333'">Success</button>
    <button onclick="showToast('warning')" class="font-mono-custom text-xs px-5 py-2.5 rounded-xl border transition-all duration-200" style="background:#003333;border-color:#027c68;color:#b0e892;" onmouseover="this.style.background='#027c68'" onmouseout="this.style.background='#003333'">Warning</button>
    <button onclick="showToast('error')"   class="font-mono-custom text-xs px-5 py-2.5 rounded-xl border transition-all duration-200" style="background:#003333;border-color:#027c68;color:#b0e892;" onmouseover="this.style.background='#027c68'" onmouseout="this.style.background='#003333'">Error</button>
    <button onclick="showToast('info')"    class="font-mono-custom text-xs px-5 py-2.5 rounded-xl border transition-all duration-200" style="background:#003333;border-color:#027c68;color:#b0e892;" onmouseover="this.style.background='#027c68'" onmouseout="this.style.background='#003333'">Info</button>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 flex flex-col-reverse gap-2.5 items-center z-50 pointer-events-none"></div>


  
  <script>
    const toastData = {
      success: {
        title: 'SYNC COMPLETE',
        message: 'All records have been saved successfully.',
        icon: `<svg viewBox="0 0 24 24" fill="#b0e892" width="18" height="18"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`,
        duration: 4000,
        barColor: '#b0e892',
        logoStyle: 'background:linear-gradient(135deg,#009983,#00b894)',
        progressStyle: 'background:linear-gradient(90deg,#027c68,#b0e892)',
        titleColor: '#b0e892',
        msgColor: 'rgba(176,232,146,0.65)',
        timeColor: 'rgba(176,232,146,0.3)'
      },
      warning: {
        title: 'LOW THRESHOLD',
        message: 'Usage is approaching your plan limit.',
        icon: `<svg viewBox="0 0 24 24" fill="#f6e27a" width="18" height="18"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>`,
        duration: 5000,
        barColor: '#f6c90e',
        logoStyle: 'background:linear-gradient(135deg,#7a5800,#c49a00);border-color:rgba(246,201,14,0.25);box-shadow:0 0 12px rgba(246,201,14,0.25)',
        progressStyle: 'background:linear-gradient(90deg,#c49a00,#f6c90e)',
        titleColor: '#f6e27a',
        msgColor: 'rgba(246,226,122,0.6)',
        timeColor: 'rgba(246,226,122,0.3)'
      },
      error: {
        title: 'CONNECTION LOST',
        message: 'Unable to reach server. Retrying in 5s…',
        icon: `<svg viewBox="0 0 24 24" fill="#ffaaaa" width="18" height="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>`,
        duration: 6000,
        barColor: '#ff6b6b',
        logoStyle: 'background:linear-gradient(135deg,#5c0000,#b02020);border-color:rgba(255,107,107,0.25);box-shadow:0 0 12px rgba(255,107,107,0.25)',
        progressStyle: 'background:linear-gradient(90deg,#b02020,#ff6b6b)',
        titleColor: '#ffaaaa',
        msgColor: 'rgba(255,170,170,0.6)',
        timeColor: 'rgba(255,170,170,0.3)'
      },
      info: {
        title: 'NEW UPDATE',
        message: 'Version 2.4.1 is available for install.',
        icon: `<svg viewBox="0 0 24 24" fill="#b0e892" width="18" height="18"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>`,
        duration: 4000,
        barColor: '#b0e892',
        logoStyle: 'background:linear-gradient(135deg,#009983,#027c68)',
        progressStyle: 'background:linear-gradient(90deg,#027c68,#b0e892)',
        titleColor: '#b0e892',
        msgColor: 'rgba(176,232,146,0.65)',
        timeColor: 'rgba(176,232,146,0.3)'
      }
    };


    
    function showToast(type) {
      const d = toastData[type];
      const container = document.getElementById('toast-container');
      const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

      const toast = document.createElement('div');
      // Tailwind classes for base toast
      toast.className = `toast toast-glow ${type} pointer-events-auto relative flex items-start gap-3 rounded-2xl border overflow-hidden`;
      toast.style.cssText = `
        min-width:320px; max-width:380px;
        background:#003333;
        border-color:#027c68;
        padding:14px 16px;
        box-shadow:0 8px 32px rgba(0,0,0,0.45), 0 0 0 1px rgba(176,232,146,0.08), inset 0 1px 0 rgba(176,232,146,0.07);
      `;

      toast.innerHTML = `
        <!-- Left bar -->
        <div class="absolute left-0 rounded-r" style="top:12px;bottom:12px;width:3px;background:${d.barColor};"></div>

        <!-- Logo -->
        <div class="flex items-center justify-center flex-shrink-0 rounded-xl border" style="width:36px;height:36px;${d.logoStyle};border-color:rgba(176,232,146,0.2);box-shadow:0 0 12px rgba(0,153,131,0.35);">
          ${d.icon}
        </div>

        <!-- Body -->
        <div class="flex-1 min-w-0">
          <div class="font-mono-custom font-bold tracking-wide truncate" style="font-size:12px;color:${d.titleColor};margin-bottom:2px;">${d.title}</div>
          <div style="font-size:12.5px;color:${d.msgColor};line-height:1.45;">${d.message}</div>
          <div class="font-mono-custom mt-1" style="font-size:10px;color:${d.timeColor};">${time}</div>
        </div>

        <!-- Close -->
        <button onclick="dismissToast(this.closest('.toast'))" class="flex items-center justify-center flex-shrink-0 rounded transition-all duration-200 -mt-0.5" style="background:none;border:none;color:rgba(176,232,146,0.35);padding:2px;cursor:pointer;"
          onmouseover="this.style.color='#b0e892';this.style.background='rgba(176,232,146,0.08)'"
          onmouseout="this.style.color='rgba(176,232,146,0.35)';this.style.background='none'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>

        <!-- Progress bar -->
        <div class="toast-progress"  style="${d.progressStyle};animation-duration:${d.duration}ms;"></div>
      `;

      container.appendChild(toast);
      const timer = setTimeout(() => dismissToast(toast), d.duration);
      toast._timer = timer;
    }

    function dismissToast(toast) {
      if (!toast || toast.classList.contains('dismissing')) return;
      clearTimeout(toast._timer);
      toast.classList.add('dismissing');
      toast.addEventListener('animationend', () => toast.remove());
    }

    setTimeout(() => showToast('success'), 400);
  </script>
</body>
</html>
